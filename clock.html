<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Analog Clock</title>

<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .clock {
        width: 300px;
        height: 300px;
        border: 10px solid white;
        border-radius: 50%;
        position: relative;
        background: #fff;
    }

    .number {
        position: absolute;
        width: 100%;
        height: 100%;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
    }

    .number1  { transform: rotate(30deg); }
    .number2  { transform: rotate(60deg); }
    .number3  { transform: rotate(90deg); }
    .number4  { transform: rotate(120deg); }
    .number5  { transform: rotate(150deg); }
    .number6  { transform: rotate(180deg); }
    .number7  { transform: rotate(210deg); }
    .number8  { transform: rotate(240deg); }
    .number9  { transform: rotate(270deg); }
    .number10 { transform: rotate(300deg); }
    .number11 { transform: rotate(330deg); }

    .number div {
        transform: rotate(-30deg);
        margin-top: 10px;
    }

    .hand {
        position: absolute;
        bottom: 50%;
        left: 50%;
        transform-origin: bottom;
        transform: translateX(-50%) rotate(0deg);
        border-radius: 10px;
    }

    .hour {
        width: 8px;
        height: 80px;
        background: black;
    }

    .minute {
        width: 6px;
        height: 110px;
        background: blue;
    }

    .second {
        width: 3px;
        height: 130px;
        background: red;
    }

    .center {
        position: absolute;
        width: 15px;
        height: 15px;
        background: black;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
    }
</style>
</head>

<body>

<div class="clock">
    <div class="number number1"><div>1</div></div>
    <div class="number number2"><div>2</div></div>
    <div class="number number3"><div>3</div></div>
    <div class="number number4"><div>4</div></div>
    <div class="number number5"><div>5</div></div>
    <div class="number number6"><div>6</div></div>
    <div class="number number7"><div>7</div></div>
    <div class="number number8"><div>8</div></div>
    <div class="number number9"><div>9</div></div>
    <div class="number number10"><div>10</div></div>
    <div class="number number11"><div>11</div></div>

    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>

    <div class="center"></div>
</div>

<script>
    const hourHand = document.getElementById("hour");
    const minuteHand = document.getElementById("minute");
    const secondHand = document.getElementById("second");

    function updateClock() {
        const now = new Date();

        const seconds = now.getSeconds();
        const minutes = now.getMinutes();
        const hours = now.getHours();

        const secondDeg = seconds * 6;
        const minuteDeg = minutes * 6 + seconds * 0.1;
        const hourDeg = hours * 30 + minutes * 0.5;

        secondHand.style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;
        minuteHand.style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
        hourHand.style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
    }

    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
